{% extends 'finances/base.html' %}
{% block content %}
<h1>Currencies <a class="btn" href="{% url 'currency_add' %}">+ Add</a></h1>
<table class="table">
  <thead><tr><th>Code</th><th>Name</th><th>Actions</th></tr></thead>
  <tbody>
    {% for obj in object_list %}
      <tr>
        <td>{{ obj.code }}</td><td>{{ obj.name }}</td>
        <td>
          <a class="btn" href="{% url 'currency_edit' obj.pk %}">Edit</a>
          <a class="btn" href="{% url 'currency_delete' obj.pk %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="3">No currencies yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
