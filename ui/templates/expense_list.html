{% extends 'finances/base.html' %}
{% block content %}
<h1>Expenses <a class="btn" href="{% url 'expense_add' %}">+ Add</a></h1>
<table class="table">
  <thead><tr><th>Title</th><th>Type</th><th>Amount</th><th>Date</th><th>Actions</th></tr></thead>
  <tbody>
    {% for e in object_list %}
      <tr>
        <td>{{ e.title }}</td>
        <td>{{ e.expense_type|capfirst }}</td>
        <td>{{ e.amount }}</td>
        <td>{{ e.date }}</td>
        <td>
          <a class="btn" href="{% url 'expense_edit' e.pk %}">Edit</a>
          <a class="btn" href="{% url 'expense_delete' e.pk %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No expenses.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
